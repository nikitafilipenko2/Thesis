server {
    listen 80;
    server_name example.com www.example.com;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/thesis/backend/staticfiles/;
    }

    location /media/ {
        alias /var/www/thesis/backend/media/;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn-thesis.sock;
        proxy_read_timeout 300;
    }
}
