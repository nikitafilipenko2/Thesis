services:
  model-init:
    build:
      context: ./backend
    container_name: thesis-model-init
    restart: "no"
    env_file:
      - ./.env
    environment:
      HF_HOME: /models-cache/huggingface
      POSTGRES_ENABLED: "False"
    entrypoint: ["python", "/app/preload_models.py"]
    volumes:
      - model_cache:/models-cache

  db:
    image: postgres:16-alpine
    container_name: thesis-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-thesis}
      POSTGRES_USER: ${POSTGRES_USER:-thesis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thesis} -d ${POSTGRES_DB:-thesis}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./backend
    container_name: thesis-web
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      HF_HOME: /models-cache/huggingface
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      model-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    volumes:
      - model_cache:/models-cache
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  nginx:
    image: nginx:1.27-alpine
    container_name: thesis-nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./deploy/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro

volumes:
  postgres_data:
  model_cache:
  static_volume:
  media_volume:
