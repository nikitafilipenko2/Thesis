{% extends 'api/base.html' %}

{% block title %}Главная{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Суммаризация текста</h4>
            </div>
            <div class="card-body">
                <div x-data="summarizerApp()" x-init="init()">
                    {% csrf_token %}

                    <!-- Вкладки -->
                    <ul class="nav nav-tabs mb-3">
                        <li class="nav-item">
                            <button class="nav-link" :class="{'active': tab === 'text'}" @click="tab = 'text'" type="button">
                                <i class="bi bi-text-paragraph"></i> Текст
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" :class="{'active': tab === 'file'}" @click="tab = 'file'" type="button">
                                <i class="bi bi-file-earmark"></i> Файл
                            </button>
                        </li>
                    </ul>

                    <!-- Вкладка Текст -->
                    <div x-show="tab === 'text'" x-transition>
                        <div class="mb-3">
                            <label class="form-label">Введите текст</label>
                            <textarea class="form-control"
                                      x-model="text"
                                      @input="analyzeAndUpdateSliders()"
                                      rows="8"
                                      placeholder="Вставьте текст для суммаризации..."></textarea>
                        </div>
                    </div>

                    <!-- Вкладка Файл -->
                    <div x-show="tab === 'file'" x-transition>
                        <div class="mb-3">
                            <label class="form-label">Выберите файл</label>
                            <input type="file"
                                   class="form-control"
                                   accept=".txt,.pdf,.docx"
                                   @change="uploadFile($event)">
                            <div class="form-text">Поддерживаются .txt, .pdf, .docx (макс 10 МБ)</div>
                        </div>
                        <div x-show="fileInfo" x-text="fileInfo" class="alert" :class="fileInfoClass"></div>
                    </div>

                    <!-- Выбор модели -->
                    <div class="row mb-3 mt-3">
                        <div class="col-md-12">
                            <label class="form-label">Модель суммаризации</label>
                            <select class="form-select" x-model="model" @change="updateModel()">
                                <optgroup label="Экстрактивные">
                                    <option value="extractive_textrank">TextRank</option>
                                    <option value="extractive_lsa">LSA</option>
                                    <option value="extractive_lexrank">LexRank</option>
                                </optgroup>
                                <optgroup label="Абстрактивные">
                                    <option value="abstractive_cointegrated">ruT5 Base (лёгкая)</option>
                                    <option value="abstractive_rut5">ruT5 (средняя)</option>
                                    <option value="abstractive_mbart">mBART (тяжёлая)</option>
                                </optgroup>
                            </select>
                        </div>
                    </div>

                    <!-- Параметры экстрактивные -->
                    <div x-show="isExtractive" x-transition class="row mb-3">
                        <div class="col-md-12">
                            <label class="form-label">Количество предложений: <span x-text="sentenceCount"></span></label>
                            <input type="range"
                                   class="form-range"
                                   x-model="sentenceCount"
                                   x-ref="sentenceSlider"
                                   min="1"
                                   max="20"
                                   step="1">
                        </div>
                    </div>

                    <!-- Параметры абстрактивные -->
                    <div x-show="!isExtractive" x-transition class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Минимум слов: <span x-text="minWords"></span></label>
                            <input type="range" class="form-range" x-model="minWords" x-ref="minWordsSlider" min="20" max="490" step="10">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Максимум слов: <span x-text="maxWords"></span></label>
                            <input type="range" class="form-range" x-model="maxWords" x-ref="maxWordsSlider" min="30" max="500" step="10">
                        </div>
                    </div>

                    <!-- Кнопка отправки -->
                    <div class="d-grid">
                        <button type="button" class="btn btn-primary btn-lg" @click="summarize" :disabled="loading">
                            <span x-show="!loading">✨ Суммаризировать</span>
                            <span x-show="loading">
                                <span class="spinner-border spinner-border-sm me-2"></span>
                                Обработка...
                            </span>
                        </button>
                    </div>

                    <!-- Результат -->
                    <div x-show="result" x-transition class="mt-4">
                        <hr>
                        <h5>Результат:</h5>
                        <div class="result-box" x-html="resultHtml"></div>
                        <div class="mt-2 d-flex justify-content-between">
                            <button class="btn btn-sm btn-outline-primary" @click="copyResult">
                                <i class="bi bi-clipboard"></i> Копировать
                            </button>
                            <span class="text-muted" x-text="processingTime"></span>
                            <span class="badge bg-info" x-text="stats"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/home.js"></script>
{% endblock %}
